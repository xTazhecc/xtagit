<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMV梯度规则配置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      min-height: 100vh;
      margin: 0;
    }

    .navbar {
      background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
      width: 200px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
      z-index: 100;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 0 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      font-weight: bold;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 600;
      color: white;
      letter-spacing: 1px;
      text-align: center;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      padding: 0 8px;
    }

    .nav-link {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
      position: relative;
      border-radius: 6px;
      margin: 0 4px;
    }

    .nav-link:hover {
      color: white;
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-link.active {
      color: white;
      background: rgba(52, 152, 219, 0.2);
    }

    .nav-link.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 20px;
      background: linear-gradient(180deg, #3498db, #2ecc71);
      border-radius: 0 3px 3px 0;
    }

    .nav-right {
      display: flex;
      justify-content: center;
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .notification-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .notification-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .notification-btn::after {
      content: '3';
      position: absolute;
      top: -4px;
      right: -4px;
      background: #e74c3c;
      color: white;
      font-size: 10px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-content {
      margin-left: 200px;
      min-height: 100vh;
    }

    .breadcrumb {
      background: white;
      padding: 16px 32px;
      border-bottom: 1px solid #e8eaed;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .breadcrumb-item {
      font-size: 13px;
      color: #646a73;
    }

    .breadcrumb-item.active {
      color: #2c3e50;
      font-weight: 500;
    }

    .breadcrumb-arrow {
      color: #c0c4cc;
    }

    .content {
      padding: 24px 32px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, #3498db, #2ecc71);
      border-radius: 2px;
    }

    .add-btn {
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    .main-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f2f5;
      background: linear-gradient(90deg, #f8fafc 0%, white 100%);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 16px 24px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: #646a73;
      background: #fafbfc;
      border-bottom: 2px solid #f0f2f5;
      white-space: nowrap;
    }

    td {
      padding: 16px 24px;
      font-size: 14px;
      color: #454d5d;
      border-bottom: 1px solid #f5f6f7;
      transition: background 0.2s ease;
    }

    tr:hover td {
      background: #fafbfc;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-active {
      background: rgba(46, 204, 113, 0.1);
      color: #2ecc71;
    }

    .status-active::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #2ecc71;
      border-radius: 50%;
    }

    .edit-btn {
      background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 4px rgba(243, 156, 18, 0.3);
    }

    .edit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(243, 156, 18, 0.4);
    }

    .card-footer {
      padding: 16px 24px;
      border-top: 1px solid #f0f2f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fafbfc;
    }

    .footer-left {
      font-size: 13px;
      color: #8f959e;
    }

    .footer-right {
      font-size: 13px;
      color: #8f959e;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: white;
      border-radius: 12px;
      width: 90%;
      max-width: 480px;
      overflow: hidden;
      animation: slideUp 0.3s ease;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f2f5;
      background: linear-gradient(90deg, #2c3e50 0%, #34495e 100%);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: white;
    }

    .modal-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #454d5d;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      color: #2c3e50;
      transition: all 0.2s ease;
      background: #fafbfc;
    }

    .form-input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
      background: white;
    }

    .form-hint {
      font-size: 12px;
      color: #99a3ad;
      margin-top: 4px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #f0f2f5;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-cancel {
      background: #f5f6f7;
      color: #646a73;
    }

    .btn-cancel:hover {
      background: #e8eaed;
    }

    .btn-save {
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
    }

    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(52, 152, 219, 0.4);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .currency-input {
      position: relative;
    }

    .currency-input::before {
      content: '¥';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #99a3ad;
      pointer-events: none;
    }

    .currency-input .form-input {
      padding-left: 32px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">P</div>
      <span class="logo-text">平台管理系统</span>
    </div>
    <div class="nav-links">
      <a href="#" class="nav-link active">系统设置</a>
      <a href="#" class="nav-link">用户管理</a>
      <a href="#" class="nav-link">商户管理</a>
      <a href="#" class="nav-link">数据统计</a>
    </div>
    <div class="nav-right">
      <button class="notification-btn">🔔</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="breadcrumb">
    <span class="breadcrumb-item">首页</span>
    <span class="breadcrumb-arrow">›</span>
    <span class="breadcrumb-item">系统设置</span>
    <span class="breadcrumb-arrow">›</span>
    <span class="breadcrumb-item">保证金规则</span>
    <span class="breadcrumb-arrow">›</span>
    <span class="breadcrumb-item active">GMV梯度配置</span>
  </div>

  <div class="content">
    <div class="page-header">
      <h1 class="page-title">GMV梯度规则配置</h1>
      <button class="add-btn" onclick="openModal()">
        <span>+</span>
        <span>添加梯度</span>
      </button>
    </div>

    <div class="main-card">
      <div class="card-header">
        <h2 class="card-title">规则列表</h2>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th>GMV范围</th>
              <th>保证金要求</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>0 - 1万</td>
              <td>¥8,000</td>
              <td><span class="status-badge status-active">生效</span></td>
              <td><button class="edit-btn" onclick="editRow(1)">编辑</button></td>
            </tr>
            <tr>
              <td>2</td>
              <td>1万 - 10万</td>
              <td>¥12,000</td>
              <td><span class="status-badge status-active">生效</span></td>
              <td><button class="edit-btn" onclick="editRow(2)">编辑</button></td>
            </tr>
            <tr>
              <td>3</td>
              <td>10万 - 50万</td>
              <td>¥20,000</td>
              <td><span class="status-badge status-active">生效</span></td>
              <td><button class="edit-btn" onclick="editRow(3)">编辑</button></td>
            </tr>
            <tr>
              <td>4</td>
              <td>50万以上</td>
              <td>¥50,000</td>
              <td><span class="status-badge status-active">生效</span></td>
              <td><button class="edit-btn" onclick="editRow(4)">编辑</button></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer">
        <div class="footer-left">共 4 条规则</div>
        <div class="footer-right">每页 10 条</div>
      </div>
    </div>
  </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">GMV梯度规则配置</h2>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">GMV最小值（元）</label>
          <div class="currency-input">
            <input type="number" class="form-input" id="gmvMin" placeholder="请输入GMV最小值">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">GMV最大值（元）</label>
          <div class="currency-input">
            <input type="number" class="form-input" id="gmvMax" placeholder="请输入GMV最大值">
          </div>
          <div class="form-hint">（留空表示无上限）</div>
        </div>
        <div class="form-group">
          <label class="form-label">保证金要求（元）</label>
          <div class="currency-input">
            <input type="number" class="form-input" id="deposit" placeholder="请输入保证金要求">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-save" onclick="saveModal()">保存</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const gmvMin = document.getElementById('gmvMin');
    const gmvMax = document.getElementById('gmvMax');
    const deposit = document.getElementById('deposit');
    let editingRow = null;

    function openModal() {
      editingRow = null;
      modalTitle.textContent = 'GMV梯度规则配置';
      gmvMin.value = '';
      gmvMax.value = '';
      deposit.value = '';
      modal.classList.add('show');
    }

    function editRow(rowNum) {
      editingRow = rowNum;
      modalTitle.textContent = '编辑GMV梯度规则';
      
      const rows = [
        { min: 0, max: 10000, deposit: 8000 },
        { min: 10000, max: 100000, deposit: 12000 },
        { min: 100000, max: 500000, deposit: 20000 },
        { min: 500000, max: '', deposit: 50000 }
      ];
      
      const data = rows[rowNum - 1];
      gmvMin.value = data.min;
      gmvMax.value = data.max;
      deposit.value = data.deposit;
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    function saveModal() {
      alert(editingRow ? '编辑成功！' : '添加成功！');
      closeModal();
    }

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });
  </script>
</body>
</html>
